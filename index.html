<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>胖哥 · pang.ge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #FFF9F0;
            --bg-gradient-end: #FFE9D6;
            --card-bg: rgba(255, 249, 240, 0.75);
            --text-primary: #4A3B2C;
            --text-secondary: #8B7355;
            --accent-color: #E67E22;
            --accent-light: #F5B041;
            --border-light: rgba(230, 126, 34, 0.15);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* 漂浮光球背景 */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }
        .orb-1 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(245, 176, 65, 0.4), rgba(230, 126, 34, 0.1));
            top: -15%;
            left: -10%;
            animation: floatOrb 22s infinite alternate ease-in-out;
        }
        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 183, 77, 0.35), rgba(255, 158, 57, 0.08));
            bottom: -20%;
            right: -15%;
            animation: floatOrb 26s infinite alternate-reverse ease-in-out;
        }
        .orb-3 {
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, rgba(255, 221, 164, 0.35), rgba(245, 176, 65, 0.1));
            top: 40%;
            left: 65%;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(4%, 6%) scale(1.15); opacity: 0.8; }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 2;
            max-width: 640px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
            padding: 2.2rem 2rem 2.8rem;
            text-align: center;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        /* 熊猫头像 */
        .avatar {
            margin-bottom: 1rem;
            display: inline-block;
        }
        .avatar-icon {
            font-size: 4.5rem;
            display: inline-block;
            animation: bounceSoft 2.5s infinite ease-in-out;
            filter: drop-shadow(0 4px 12px rgba(230, 126, 34, 0.2));
        }
        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* 域名渐变流动 */
        .domain {
            font-size: clamp(2.4rem, 10vw, 4.6rem);
            font-weight: 800;
            letter-spacing: -0.01em;
            background: linear-gradient(115deg, #E67E22, #F5B041, #E67E22);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.5rem 0 0.5rem;
            word-break: break-word;
            animation: shimmerText 3.5s infinite linear;
            line-height: 1.2;
        }
        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .greeting {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.45rem 1.3rem;
            border-radius: 60px;
            margin: 1rem 0 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            border: 1px solid rgba(230, 126, 34, 0.25);
        }
        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulseGreen 1.2s infinite;
        }
        @keyframes pulseGreen {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .bio {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin: 1rem 0 1.8rem;
            max-width: 430px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 跳动三个点 */
        .dot-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 1.5rem 0 1rem;
        }
        .dot-group span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: bounceUp 1s infinite ease-in-out both;
        }
        .dot-group span:nth-child(1) { animation-delay: -0.32s; background: #F5B041; }
        .dot-group span:nth-child(2) { animation-delay: -0.16s; background: #E67E22; }
        .dot-group span:nth-child(3) { background: #FF8C42; }
        @keyframes bounceUp {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
            40% { transform: translateY(-8px); opacity: 1; }
        }

        /* 三个链接（左中右） */
        .links {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border-top: 1px solid var(--border-light);
            padding-top: 1.5rem;
        }
        .link-item {
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        .links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            background: rgba(230, 126, 34, 0.05);
            transition: all 0.2s;
            width: 100%;
            white-space: nowrap;
        }
        .links a:hover {
            background: rgba(230, 126, 34, 0.15);
            transform: translateY(-2px);
            color: #D35400;
        }
        /* 微信专用样式（绿色风格） */
        .wechat-link {
            color: #1AAD19;
            background: rgba(26, 173, 25, 0.08);
            cursor: pointer;
        }
        .wechat-link:hover {
            background: rgba(26, 173, 25, 0.15);
            color: #0F8B0E;
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* 响应式 */
        @media (max-width: 560px) {
            .card {
                padding: 1.6rem;
            }
            .avatar-icon {
                font-size: 3.2rem;
            }
            .greeting {
                font-size: 1rem;
            }
            .bio {
                font-size: 0.9rem;
            }
            .links {
                gap: 0.5rem;
            }
            .links a {
                font-size: 0.75rem;
                padding: 0.2rem 0.4rem;
                white-space: normal;
                word-break: keep-all;
            }
            .link-item {
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="card">
        <div class="avatar">
            <div class="avatar-icon">🐼</div>
        </div>
        <div class="greeting">🤝 嘿，朋友</div>
        <div class="domain">pang.ge</div>
        <div class="badge">
            <span class="pulse-dot"></span>
            <span>✨ 随时在线 · 欢迎闲逛 ✨</span>
        </div>
        <div class="bio">
            这里是「胖哥」的小站。<br>
            一个喜欢分享生活、聊聊科技和偶尔写写代码的普通大叔。<br>
            人间烟火，快乐摸鱼。
        </div>
        <div class="dot-group">
            <span></span><span></span><span></span>
        </div>

        <!-- 三个链接：GitHub，随缘更新，微信（优化移动端显示） -->
        <div class="links">
            <div class="link-item">
                <a href="https://github.com/username" target="_blank" rel="noopener noreferrer">
                    <span>🐙</span> GitHub
                </a>
            </div>
            <div class="link-item">
                <a href="https://gb.ooo/" target="_blank" rel="noopener noreferrer">
                    <span>🌱</span> 随缘更新
                </a>
            </div>
            <div class="link-item">
                <!-- 微信图标部分：您可以自由替换下方 <span> 中的内容 -->
                <!-- 例如：使用微信 logo emoji -> 💬 或 💚 或 😂 👈 👉🟢，或者使用 Font Awesome 图标（需要额外引入库） -->
                <!-- 这里使用了一个基础的绿色微信图标占位符，您可以直接修改成您喜欢的任何字符/emoji -->
                <!-- 微信区域：点击显示微信号，桌面端悬停显示完整 ID -->
                <a href="javascript:void(0)" class="wechat-link" id="wechatButton" title="微信号: Work Space pro">
                    <span>👉</span> 微信
                </a>
            </div>
        </div>

        <div class="footer-note">
            © 2025 胖哥 · 保持好奇，保持可爱
        </div>
    </main>

    <script>
        // 移动端点击微信按钮弹出提示框显示完整微信号
        const wechatBtn = document.getElementById('wechatButton');
        if (wechatBtn) {
            wechatBtn.addEventListener('click', function(e) {
                // 移动端弹出友好提示
                if (window.innerWidth <= 560) {  // 与响应式断点一致
                    alert('微信号：Work Space pro');
                }
                // 桌面端已经通过 title 属性显示，无需额外处理
            });
        }
    </script>
</body>
</html>
